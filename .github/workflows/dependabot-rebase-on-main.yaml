name: Dependabot rebase open PRs on main update

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  refresh-dependabot-prs:
    name: Refresh open Dependabot PRs
    uses: ./.github/workflows/refresh-dependabot-prs.yaml
    secrets:
      AUTOMATION_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
    permissions:
      contents: read
