name: Dependabot rebase open PRs on main update

on:
  push:
    branches: [main]

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  rebase:
    name: Update open Dependabot PR branches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update each open Dependabot PR's branch from main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          prs=$(gh pr list \
            --state open \
            --author "app/dependabot" \
            --json number,headRefName \
            --jq '.[] | "\(.number)\t\(.headRefName)"')

          if [ -z "$prs" ]; then
            echo "No open Dependabot PRs."
            exit 0
          fi

          while IFS=$'\t' read -r pr ref; do
            echo "::group::PR #$pr"
            if gh api -X PUT "repos/$GH_REPO/pulls/$pr/update-branch" 2>&1 | tee /tmp/api.out; then
              ./scripts/dispatch-required-pr-checks.sh "$ref"
            else
              if grep -q "no new commits on the base branch" /tmp/api.out; then
                echo "(already current)"
              else
                echo "::warning::update-branch failed for PR #$pr — see log"
              fi
            fi
            echo "::endgroup::"
          done <<< "$prs"
