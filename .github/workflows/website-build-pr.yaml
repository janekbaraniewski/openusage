name: Website build (PR check)

on:
  pull_request:
    branches: [main]
    paths:
      - "website/**"
      - "docs/site/**"
      - ".github/workflows/website-build-pr.yaml"

permissions:
  contents: read

jobs:
  build:
    name: Build website (no deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            website/package-lock.json
            docs/site/package-lock.json

      - name: Install docs deps
        working-directory: docs/site
        run: npm ci

      - name: Build docs
        working-directory: docs/site
        run: npm run build

      - name: Stage docs into website/public/docs
        run: |
          mkdir -p website/public/docs
          cp -r docs/site/build/. website/public/docs/

      - name: Install website deps
        working-directory: website
        run: npm ci

      - name: Install Chromium dependencies
        working-directory: website
        run: npx puppeteer browsers install chrome

      - name: Build website
        working-directory: website
        run: npm run build
