name: Website build (PR check)

on:
  pull_request:
    branches: [main]
    paths:
      - "website/**"
      - "docs/site/**"
      - ".github/workflows/website-build-pr.yaml"

permissions:
  contents: read

jobs:
  build:
    name: Build website (no deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            website/package-lock.json
            docs/site/package-lock.json

      - name: Install docs deps
        working-directory: docs/site
        run: npm ci

      - name: Build docs
        working-directory: docs/site
        run: npm run build

      - name: Stage docs into website/public/docs
        run: |
          mkdir -p website/public/docs
          cp -r docs/site/build/. website/public/docs/

      - name: Install website deps
        working-directory: website
        run: npm ci

      - name: Install Chromium dependencies
        working-directory: website
        run: npx puppeteer browsers install chrome

      - name: Build website
        working-directory: website
        run: npm run build
