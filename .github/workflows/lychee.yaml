name: Broken link check

on:
  pull_request:
    paths:
      - "docs/site/docs/**"
      - "README.md"
      - "AGENTS.md"
      - "CODEX.md"
      - ".github/workflows/lychee.yaml"
      - ".github/lychee.toml"
  schedule:
    - cron: "13 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    name: Lychee
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.run_id }}
          restore-keys: lychee-cache-

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Docusaurus validates internal docs links at build time.
          # Lychee runs against top-level repo READMEs only, so we catch
          # external URL rot without fighting Docusaurus's route system.
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --config .github/lychee.toml
            "README.md"
            "AGENTS.md"
            "CODEX.md"
            "docs/CI_AUTOMATION_BOTS.md"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open or update sticky issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links detected by lychee"
          content-filepath: ./lychee/out.md
          labels: |
            bug
            docs
