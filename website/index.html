      <h1>OpenUsage — LLM Cost Tracking &amp; AI Agent Usage Dashboard</h1>
      <p>OpenUsage is a free, open-source LLM dashboard for tracking AI agent costs and token consumption from your terminal. It auto-detects 17 installed tools including Claude Code, Cursor, Copilot, Codex CLI, Gemini CLI, OpenRouter, and Ollama, then displays live cost tracking, quotas, model burn rates, token usage, and telemetry.</p>
      <h2>LLM Cost Tracking &amp; AI Observability Features</h2>
      <p>Track AI agent costs across all your coding tools. Monitor LLM token usage and consumption per model and per session. View spend limits, quota usage, model burn rates, daily cost trends, and token distribution breakdowns. Track MCP tool usage and tool call frequency. Monitor API rate limits and quota thresholds. Analyze model usage patterns across providers. Session tracking with per-session cost analysis. Code statistics including lines added, languages used, and files touched. All data stays local — zero external dependencies.</p>
      <h2>Supported Providers</h2>
      <p>Coding Agents: Claude Code, Codex CLI, Cursor, Copilot, Gemini CLI, OpenCode, Ollama. API Platforms: OpenAI, Anthropic, OpenRouter, Groq, Mistral, DeepSeek, xAI, Z.AI, Gemini API, Alibaba Cloud.</p>
      <h2>Install</h2>
      <p>brew install janekbaraniewski/tap/openusage</p>
      <p>Source: <a href="https://github.com/janekbaraniewski/openusage">github.com/janekbaraniewski/openusage</a></p>
